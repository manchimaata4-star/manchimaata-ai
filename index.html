<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ManchiMaata AI</title>
<style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:#fff;
max-width:800px;
margin:auto;
padding:20px;
}
input,button{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
font-size:16px;
}
button{
background:#2563eb;
color:#fff;
border:none;
cursor:pointer;
}
pre{
background:#1e293b;
padding:15px;
border-radius:8px;
white-space:pre-wrap;
}
</style>
</head>
<body>

<h1>ManchiMaata AI</h1>

<input id="apikey" type="password" placeholder="Gemini API Key">

<input id="topic" placeholder="Enter Topic">

<button onclick="generate()">Generate</button>

<pre id="result"></pre>

<script>
async function generate(){

const key=document.getElementById("apikey").value.trim();
const topic=document.getElementById("topic").value.trim();

if(!key||!topic){
document.getElementById("result").textContent="Enter API Key and Topic";
return;
}

document.getElementById("result").textContent="Generating...";

const prompt=`Create Telugu YouTube Shorts content.

Topic: ${topic}

Give:
1. Hook
2. 60 Second Script
3. SEO Title
4. Description
5. 15 Hashtags`;

try{

const response=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{text:prompt}
]
}
]
})
});

const data=await response.json();

if(data.error){
document.getElementById("result").textContent=data.error.message;
return;
}

document.getElementById("result").textContent=
data.candidates[0].content.parts[0].text;

}catch(e){
document.getElementById("result").textContent=e.message;
}

}
</script>

</body>
</html>
